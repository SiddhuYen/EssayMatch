<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ScholarshipMatch — Your Scholarships</title>
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet" />

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f7f5f0;
      --surface: #ffffff;
      --border: #e2ddd6;
      --text: #1a1916;
      --muted: #6b6860;
      --accent: #2a5f4a;
      --accent-light: #e8f2ee;
      --accent-muted: #4a8c72;
      --danger: #c0392b;
      --danger-bg: #fef2f2;
      --radius: 14px;
      --radius-sm: 8px;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      font-size: 15px;
      line-height: 1.6;
    }

    header {
      padding: 1.25rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
      position: sticky;
      top: 0;
      z-index: 20;
      gap: 1rem;
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 1.35rem;
      color: var(--accent);
      letter-spacing: -0.02em;
      flex-shrink: 0;
    }

    .logo span { color: var(--text); }

    .header-right {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0.55rem 1.2rem;
      border-radius: 999px;
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      border: none;
      transition: all 0.2s;
      text-decoration: none;
      white-space: nowrap;
    }

    .btn-primary { background: var(--accent); color: white; }
    .btn-primary:hover { background: #1e4a38; }

    .btn-ghost {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text);
    }

    .btn-ghost:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    .container {
      max-width: 760px;
      margin: 0 auto;
      padding: 2.5rem 1.5rem 4rem;
    }

    #status-box {
      padding: 0.7rem 1rem;
      border-radius: var(--radius-sm);
      background: var(--accent-light);
      color: var(--accent);
      font-size: 14px;
      margin-bottom: 1.5rem;
    }

    #status-box.error {
      background: var(--danger-bg);
      color: var(--danger);
    }

    .section-title {
      font-family: 'DM Serif Display', serif;
      font-size: 1.8rem;
      font-weight: 400;
      letter-spacing: -0.02em;
      margin-bottom: 0.35rem;
    }

    .section-title em {
      font-style: italic;
      color: var(--accent);
    }

    .section-sub {
      font-size: 13px;
      color: var(--muted);
      margin-bottom: 1.25rem;
    }

    .results-count {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 12px;
      font-weight: 500;
      padding: 3px 10px;
      border-radius: 999px;
      margin-bottom: 1.25rem;
    }

    .result-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      margin-bottom: 10px;
      overflow: hidden;
      transition: box-shadow 0.2s;
    }

    .result-card:hover {
      box-shadow: 0 2px 12px rgba(0,0,0,0.06);
    }

    .result-header {
      padding: 1.1rem 1.4rem;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 1rem;
    }

    .match-score {
      flex-shrink: 0;
      width: 42px;
      height: 42px;
      border-radius: 50%;
      background: var(--accent-light);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 500;
      color: var(--accent);
      margin-top: 2px;
    }

    .result-meta {
      flex: 1;
      min-width: 0;
    }

    .result-purpose {
      font-size: 14px;
      font-weight: 500;
      margin-bottom: 3px;
      line-height: 1.4;
    }

    .result-url {
      font-size: 12px;
      color: var(--muted);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .expand-icon {
      flex-shrink: 0;
      color: var(--muted);
      font-size: 16px;
      margin-top: 4px;
      transition: transform 0.2s;
    }

    .result-card.expanded .expand-icon {
      transform: rotate(180deg);
    }

    .result-body {
      display: none;
      padding: 0 1.4rem 1.4rem;
      border-top: 1px solid var(--border);
    }

    .result-card.expanded .result-body {
      display: block;
    }

    .section-label {
      font-size: 11px;
      font-weight: 500;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin: 1.1rem 0 0.5rem;
    }

    .essay-box {
      background: var(--bg);
      border-radius: var(--radius-sm);
      padding: 0.9rem 1rem;
      font-size: 13px;
      line-height: 1.7;
      max-height: 160px;
      overflow-y: auto;
    }

    .essay-prompt-tag {
      display: inline-block;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 11px;
      padding: 2px 9px;
      border-radius: 999px;
      margin-bottom: 0.6rem;
      font-weight: 500;
    }

    .advice-list {
      list-style: none;
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .advice-item {
      display: flex;
      gap: 10px;
      font-size: 13px;
      line-height: 1.6;
      align-items: flex-start;
    }

    .advice-bullet {
      width: 19px;
      height: 19px;
      border-radius: 50%;
      background: var(--accent-light);
      color: var(--accent);
      font-size: 10px;
      font-weight: 500;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
    }

    .apply-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      margin-top: 1.1rem;
      padding: 0.45rem 1rem;
      border: 1px solid var(--accent);
      color: var(--accent);
      border-radius: 999px;
      font-size: 13px;
      font-weight: 500;
      text-decoration: none;
      transition: all 0.2s;
      background: transparent;
    }

    .apply-btn:hover {
      background: var(--accent);
      color: white;
    }

    .empty-state {
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: var(--radius);
      padding: 2rem;
      text-align: center;
      color: var(--muted);
      font-size: 14px;
    }

    @media (max-width: 520px) {
      header {
        padding: 1rem;
        flex-wrap: wrap;
      }

      .header-right {
        width: 100%;
        justify-content: flex-end;
      }
    }
  </style>
</head>

<body>
  <header>
    <div class="logo">Scholarship<span>Match</span></div>
    <div class="header-right">
      <a class="btn btn-ghost" href="/dashboard">← Essays</a>
      <button class="btn btn-primary" id="rematch-btn">Rematch</button>
      <button class="btn btn-ghost" id="logout-btn">Sign out</button>
    </div>
  </header>

  <div class="container">
    <div id="status-box">Loading your saved scholarships…</div>

    <h1 class="section-title">Your <em>scholarships</em></h1>
    <p class="section-sub" id="page-sub">Saved matches from your latest scholarship run.</p>

    <div class="results-count" id="results-count"></div>
    <div id="results-list"></div>
  </div>

  <script>
    let userProfile = {};

    function setStatus(msg, isError = false) {
      const el = document.getElementById('status-box');
      el.textContent = msg;
      el.classList.toggle('error', isError);
    }

    function escapeHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#039;');
    }

    function safeUrl(url) {
      const s = String(url || '').trim();
      return s.startsWith('http://') || s.startsWith('https://') ? s : '#';
    }

    async function fetchJson(url, opts = {}) {
      const res = await fetch(url, {
        credentials: 'include',
        headers: { 'Content-Type': 'application/json', ...(opts.headers || {}) },
        ...opts,
      });

      let data = null;
      try { data = await res.json(); } catch { data = null; }

      if (!res.ok) {
        throw new Error(data?.error || `Request failed: ${res.status}`);
      }

      return data;
    }

    function parseAdvice(text) {
      if (!text) return ['Review the scholarship requirements and tailor your essay.'];

      const lines = text.split('\n').filter(l => l.trim());

      return lines
        .map(l => l.replace(/^[\d.\-*•]+\s*/, '').replace(/\*\*/g, '').trim())
        .filter(l => l.length > 10)
        .slice(0, 3);
    }

    function truncate(str, n) {
      const s = typeof str === 'string' ? str : '';
      return s.length > n ? s.slice(0, n) + '…' : s;
    }

    function renderResults(results) {
      const list = document.getElementById('results-list');
      const count = document.getElementById('results-count');

      results = Array.isArray(results) ? results : [];

      count.textContent = `${results.length} scholarships matched`;
      list.innerHTML = '';

      if (!results.length) {
        list.innerHTML = `
          <div class="empty-state">
            No saved scholarships yet. Go back to your essays and run your first match.
          </div>
        `;
        return;
      }

      results.forEach(r => {
        const score = Math.round((r.match_score || 0) * 100);
        const advice = parseAdvice(r.adaptation_advice);

        const card = document.createElement('div');
        card.className = 'result-card';

        card.innerHTML = `
          <div class="result-header">
            <div class="match-score">${score}%</div>
            <div class="result-meta">
              <div class="result-purpose">${escapeHtml(r.scholarship_purpose || 'Scholarship opportunity')}</div>
              <div class="result-url">${escapeHtml(r.scholarship_url || '')}</div>
            </div>
            <div class="expand-icon">↓</div>
          </div>

          <div class="result-body">
            <div class="section-label">Best essay to use</div>
            ${r.best_essay_prompt ? `<div class="essay-prompt-tag">${escapeHtml(truncate(r.best_essay_prompt, 80))}</div>` : ''}
            <div class="essay-box">${escapeHtml(r.best_essay_response || '').replace(/\n/g, '<br>')}</div>

            <div class="section-label">What to change</div>
            <ul class="advice-list">
              ${advice.map((line, i) => `
                <li class="advice-item">
                  <div class="advice-bullet">${i + 1}</div>
                  <span>${escapeHtml(line)}</span>
                </li>
              `).join('')}
            </ul>

            <a class="apply-btn" href="${safeUrl(r.scholarship_url)}" target="_blank" rel="noopener noreferrer">
              View scholarship →
            </a>
          </div>
        `;

        card.querySelector('.result-header').addEventListener('click', () => {
          card.classList.toggle('expanded');
        });

        list.appendChild(card);
      });
    }

    async function loadSavedMatches() {
      const saved = await fetchJson('/api/saved-matches');
      const matches = Array.isArray(saved.matches) ? saved.matches : [];

      renderResults(matches);

      if (saved.updatedAt) {
        document.getElementById('page-sub').textContent =
          `Saved matches from your latest run · updated ${saved.updatedAt}`;
      }

      setStatus(matches.length ? 'Loaded saved scholarships.' : 'No saved scholarships yet.');
    }

    async function rematch() {
      const btn = document.getElementById('rematch-btn');
      btn.disabled = true;
      btn.textContent = 'Matching…';

      try {
        setStatus('Running a fresh scholarship match…');

        const results = await fetchJson('/api/match', {
          method: 'POST',
          body: JSON.stringify({ profile: userProfile }),
        });

        renderResults(results);
        setStatus(`Updated your scholarships with ${results.length} matches.`);
      } catch (err) {
        setStatus(err.message, true);
      } finally {
        btn.disabled = false;
        btn.textContent = 'Rematch';
      }
    }

    document.getElementById('rematch-btn').addEventListener('click', rematch);

    document.getElementById('logout-btn').addEventListener('click', async () => {
      try {
        await fetchJson('/auth/logout', { method: 'POST' });
        window.location.href = '/';
      } catch (err) {
        setStatus(err.message, true);
      }
    });

    (async function init() {
      try {
        const me = await fetchJson('/api/me');
        userProfile = me.profile || {};
        await loadSavedMatches();
      } catch (err) {
        setStatus(err.message, true);
      }
    })();
  </script>
</body>
</html>
